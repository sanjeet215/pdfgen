spring.application.name=pdfgen
spring.datasource.url=jdbc:mysql://localhost:3306/mydatabase?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
# optional threshold before files are written to disk
spring.servlet.multipart.file-size-threshold=2MB

# ===== CORS configuration =====
# For development: leave cors allowed-origins empty to allow all origins WITHOUT credentials.
# For production: set cors allowed-origins to a comma-separated list of exact origins, e.g.
#   https://app.example.com,https://admin.example.com
# If you need cookies/Authorization headers across origins, set cors.allow-credentials=true
# and make sure allowed origins are NOT wildcard.
# Methods/headers can be tuned as needed.
cors.allowed-origins=
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=Authorization,Content-Type,Accept,X-Requested-With
cors.exposed-headers=Content-Disposition
cors.allow-credentials=true